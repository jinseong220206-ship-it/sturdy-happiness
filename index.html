<div id="loading-screen">데이터 실시간 동기화 중...</div>

<div id="custom-login-modal">

        <h2 style="color:#2563eb; margin-top:0; margin-bottom:6px; font-size:20px;">⚔️ 길드 통합 시스템 로그인</h2>

<div class="container">

    <div class="main-content">
        <header>
            <div>

                </div>
            </div>
        </div>

        <div class="storage-section">
            <div class="storage-title">
                <span style="color:#38bdf8;">🛠️ 영웅 일러스트 스토리지</span>
                <div style="display:flex; gap:6px;">
                    <input type="text" id="storage-hero-search" placeholder="🔍 영웅 검색..." oninput="drawHeroStorage()" style="width:100px; padding:4px; font-size:12px;">
                    <input type="text" id="new-hero-name" placeholder="이름..." style="width:80px;">
                    <input type="text" id="new-hero-img" placeholder="이미지 URL..." style="width:120px;">
                    <button onclick="addHeroToStoragePool()" style="background:#0284c7; color:white; border:none; padding:3px 8px; border-radius:4px; font-weight:bold; cursor:pointer;">추가</button>
                </div>
            </div>
            <div class="hero-pool-grid" id="hero-storage-pool-container"></div>
        </div>
    </div>
</div>

<script>
    const REAL_ADMIN_PASSWORD = "2748"; 
    let isAdminMode = false; 
    let currentCastle = '외성 1번';
    let selectedDeckId = null; 
    let guildMembers = [];
    let DecksData = []; 
    let JokboData = [];
    let HeroStorage = []; 
    
    // 접속 유저는 기기 고유 상태이므로 로컬스토리지 유지
    let currentUser = localStorage.getItem('skr_current_user') || "";

    const DEFAULT_HERO_NAMES = [
        "루디", "에반", "카린", "헬레니아", "델론즈", "아리엘", "주피", "백룡", 
        "제이브", "아일린", "태오", "스파이크", "소이", "발리스타", "에이스", "여포", 
        "린", "손오공", "크리스", "레이첼", "세인", "풍연", "밍밍"
    ];

    function generateInitialDecks() {
        let idCounter = 1;
        let initialDecks = [];
        for (let c = 1; c <= 5; c++) { for (let d = 1; d <= 10; d++) initialDecks.push({ id: idCounter++, castleName: `외성 ${c}번`, deckNum: `${d}번 덱`, status: '대기중', defender: '', owner: '', attacker: '', failCount: 0 }); }
        for (let c = 1; c <= 3; c++) { for (let d = 1; d <= 15; d++) initialDecks.push({ id: idCounter++, castleName: `내성 ${c}번`, deckNum: `${d}번 덱`, status: '대기중', defender: '', owner: '', attacker: '', failCount: 0 }); }
        for (let d = 1; d <= 20; d++) initialDecks.push({ id: idCounter++, castleName: `본성`, deckNum: `${d}번 덱`, status: '대기중', defender: '', owner: '', attacker: '', failCount: 0 });
        return initialDecks;
    }

    function generateInitialJokbo() {
        return [
            { id: 1, enemy: "루디 에반 카린 헬레니아", counter: "델론즈 아리엘 주피 백룡", tips: "방깎 위주 구성, 루디 신준 타이밍에 아리엘 턴감 스킬 필수 연계", author: "시스템" }
        ];
    }

    // Firebase 데이터베이스 실시간 구독 로드 함수
    function loadFirebaseDatabase() {
        db.ref('guildData').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            // 1. 멤버 정보 로드 및 검증
            guildMembers = data.members || [];
            if (!Array.isArray(guildMembers) || guildMembers.length === 0) {
                guildMembers = Array(30).fill(null).map(() => ({ name: "", password: "0000", tickets: 5, success: 0, fail: 0 }));
                guildMembers[0].name = "길드원1"; guildMembers[1].name = "길드원2";
            }
            guildMembers.forEach(m => { if(m.fail === undefined) m.fail = 0; });

            // 2. 덱 정보 로드
            DecksData = data.decks || [];
            if (!Array.isArray(DecksData) || DecksData.length === 0) { 
                DecksData = generateInitialDecks();
            }

            // 3. 족보 정보 로드
            JokboData = data.jokbo || [];
            if (!Array.isArray(JokboData)) { JokboData = generateInitialJokbo(); }

            // 4. 영웅 스토리지 로드
            HeroStorage = data.heroStorage || [];
            if (!Array.isArray(HeroStorage) || HeroStorage.length === 0 || typeof HeroStorage[0] === 'string') {
                HeroStorage = DEFAULT_HERO_NAMES.map((name, idx) => ({
                    id: Date.now() + idx,
                    name: name,
                    img: `https://placehold.co/76x76/2563eb/ffffff?text=${encodeURIComponent(name)}`
                }));
            }

            // 모든 데이터 동기화 완료 후 UI 업데이트
            document.getElementById('loading-screen').style.display = 'none';
            drawSidebar();
            drawDecks();
            drawJokbo();
            drawHeroStorage();
            updateLoginSelectOptions();
            checkAuthStatus();
        }, (error) => {
            console.error("Firebase 데이터 리드 실패:", error);
            alert("실시간 데이터를 연동하는 중 실패했습니다. Firebase 리얼타임 데이터베이스 규칙 설정을 확인해 주세요.");
        });
    }

    // 각 저장 함수를 Firebase 실시간 쓰기 명령으로 전면 수정
    function saveMembers() { db.ref('guildData/members').set(guildMembers); }
    function saveToStorage() { db.ref('guildData/decks').set(DecksData); }
    function saveJokbo() { db.ref('guildData/jokbo').set(JokboData); }
    function saveHeroStorage() { db.ref('guildData/heroStorage').set(HeroStorage); }

    window.addEventListener('DOMContentLoaded', () => { loadFirebaseDatabase(); });

    function switchMainTab(tabName) {
        const btnReserve = document.getElementById('tab-nav-reserve');
        const btnJokbo = document.getElementById('tab-nav-jokbo');
        const winReserve = document.getElementById('window-reservation');
        const winJokbo = document.getElementById('window-jokbo');

        btnReserve.classList.remove('active');
        btnJokbo.classList.remove('active');

        if (tabName === 'reserve') {
            btnReserve.classList.add('active');
            winReserve.style.display = 'block';
            winJokbo.style.display = 'none';
        } else {
            btnJokbo.classList.add('active');
            winReserve.style.display = 'none';
            winJokbo.style.display = 'block';
            drawJokbo();
        }
    }

    function drawHeroStorage() {
        const container = document.getElementById('hero-storage-pool-container');
        if (!container) return;
        container.innerHTML = '';

        const searchInput = document.getElementById('storage-hero-search');
        const filterKeyword = searchInput ? searchInput.value.trim().toLowerCase() : '';
        
        const filteredHeroes = HeroStorage.filter(h => h.name.toLowerCase().includes(filterKeyword));

        if (filteredHeroes.length === 0) {
            container.innerHTML = `<span style="color:#64748b; font-size:11px; padding:5px;">일치하는 컬렉션 영웅이 없습니다. 관리자 권한으로 등록해보세요.</span>`;
            return;
        }

        filteredHeroes.forEach(hero => {
            let adminControls = '';
            if (isAdminMode) {
                adminControls = `
                    <button class="hero-admin-ctrl edit" title="영웅 데이터 수정" onclick="editHeroInStorage(${hero.id})">✏️</button>
                    <button class="hero-admin-ctrl del" title="영웅 영구 삭제" onclick="deleteHeroFromStorage(${hero.id})">✖</button>
                `;
            }

            container.innerHTML += `
                <div class="hero-visual-card">
                    ${adminControls}
                    <div class="hero-img-box">
                        <img src="${hero.img}" alt="${hero.name}" onerror="this.src='https://placehold.co/76x76/334155/ffffff?text=${encodeURIComponent(hero.name)}'">
                        <div class="hero-name-overlay">${hero.name}</div>
                    </div>
                    <div class="hero-card-btns">
                        <button class="hero-card-btn def" title="방어팀/지정성채 추가" onclick="pushHeroToBuilderField('${hero.name}', 'enemy')">+🛡️</button>
                        <button class="hero-card-btn atk" title="공격팀 추가" onclick="pushHeroToBuilderField('${hero.name}', 'counter')">+⚔️</button>
                    </div>
                </div>`;
        });
    }

    function addHeroToStoragePool() {
        if (!isAdminMode) { alert(`❌ 권한 거부: 스토리지 영웅 데이터 조작은 관리자만 가능합니다.`); return; }
        const nameInput = document.getElementById('new-hero-name');
        const imgInput = document.getElementById('new-hero-img');
        const name = nameInput.value.trim();
        let img = imgInput.value.trim();

        if (!name) { alert("영웅 이름을 기입해 주세요."); return; }
        if (HeroStorage.some(h => h.name === name)) { alert("이미 동일한 이름의 영웅 카드가 존재합니다."); return; }
        if (!img) { img = `https://placehold.co/76x76/2563eb/ffffff?text=${encodeURIComponent(name)}`; }

        HeroStorage.push({ id: Date.now(), name: name, img: img });
        saveHeroStorage();
        nameInput.value = ''; imgInput.value = '';
    }

    function editHeroInStorage(id) {
        if (!isAdminMode) return;
        const hero = HeroStorage.find(h => h.id === id); if (!hero) return;
        const newName = prompt(`📝 [영웅 이름 수정]\n영웅의 새로운 이름을 입력하세요:`, hero.name);
        if (newName === null || !newName.trim()) return;
        const newImg = prompt(`🖼️ [초상화 이미지 주입]\n수정할 웹 이미지 주소(URL)를 넣어주세요:`, hero.img);
        if (newImg === null) return;
        hero.name = newName.trim();
        hero.img = newImg.trim() || `https://placehold.co/76x76/2563eb/ffffff?text=${encodeURIComponent(hero.name)}`;
        saveHeroStorage();
    }

    function deleteHeroFromStorage(id) {
        if (!isAdminMode) return;
        const hero = HeroStorage.find(h => h.id === id); if (!hero) return;
        if (confirm(`⚠️ [경고] 정말로 스토리지에서 [ ${hero.name} ] 카드를 영구 삭제하시겠습니까?`)) {
            HeroStorage = HeroStorage.filter(h => h.id !== id);
            saveHeroStorage();
        }
    }

    function pushHeroToBuilderField(heroName, target) {
        if (target === 'enemy') {
            if (selectedDeckId !== null) {
                const deck = DecksData.find(d => d.id === selectedDeckId);
                if (deck && hasPermission(deck)) {
                    if (deck.status === '완파') { alert("❌ 완파 판정을 받은 성채의 방어덱 배치는 수정할 수 없습니다."); return; }
                    let prevVal = deck.defender.trim();
                    deck.defender = prevVal ? prevVal + " " + heroName : heroName;
                    deck.defender = deck.defender.replace(/\s+/g, ' ');
                    saveToStorage(); return;
                }
            }
            const inputEl = document.getElementById('input-enemy-names');
            if (inputEl) { let prevVal = inputEl.value.trim(); inputEl.value = prevVal ? prevVal + " " + heroName : heroName; }
        } else {
            const inputEl = document.getElementById('input-counter-names');
            if (inputEl) { let prevVal = inputEl.value.trim(); inputEl.value = prevVal ? prevVal + " " + heroName : heroName; }
        }
    }

    function getHeroHtmlCollection(spaceSeparatedNames) {
        if (!spaceSeparatedNames || !spaceSeparatedNames.trim()) return '<span style="color:#64748b; font-size:11px;">지정 영웅 없음</span>';
        let htmlResult = '<div class="jokbo-hero-flex">';
        spaceSeparatedNames.split(' ').forEach(name => {
            if (!name.trim()) return;
            const matchedHero = HeroStorage.find(h => h.name === name.trim());
            const imgSrc = matchedHero ? matchedHero.img : `https://placehold.co/48x48/334155/ffffff?text=${encodeURIComponent(name)}`;
            htmlResult += `
                <div class="jokbo-hero-mini" title="${name}">
                    <img src="${imgSrc}" alt="${name}" onerror="this.src='https://placehold.co/48x48/1e293b/ffffff?text=?'">
                    <div class="mini-name">${name}</div>
                </div>`;
        });
        htmlResult += '</div>';
        return htmlResult;
    }

    function editJokboRecord(id) {
        if (!isAdminMode) { alert("❌ 족보 수정은 좌측 관리자 모드 잠금 해제 후 가능합니다."); return; }
        const record = JokboData.find(j => j.id === id); if (!record) return;
        const newEnemy = prompt("상대 방어덱 수정 (공백 구분):", record.enemy); if (newEnemy === null) return;
        const newCounter = prompt("추천 공격 조합 수정 (공백 구분):", record.counter); if (newCounter === null) return;
        const newTips = prompt("공략 팁 수정:", record.tips); if (newTips === null) return;
        record.enemy = newEnemy.trim().replace(/\s+/g, ' ');
        record.counter = newCounter.trim().replace(/\s+/g, ' ');
        record.tips = newTips.trim();
        saveJokbo();
    }

    function drawJokbo() {
        const container = document.getElementById('jokbo-grid-container');
        if (!container) return; container.innerHTML = '';
        const keyword = document.getElementById('jokbo-search').value.toLowerCase().trim();
        const filtered = JokboData.filter(j => (j.enemy && j.enemy.toLowerCase().includes(keyword)) || (j.counter && j.counter.toLowerCase().includes(keyword)));
        if (filtered.length === 0) { container.innerHTML = `<div style="color:#64748b; font-size:13px; grid-column:1/-1; text-align:center; padding:30px;">검색 결과가 없습니다.</div>`; return; }
        filtered.forEach(j => {
            const enemyVisuals = getHeroHtmlCollection(j.enemy);
            const counterVisuals = getHeroHtmlCollection(j.counter);
            let editBtnHtml = isAdminMode ? `<button class="edit-btn" onclick="editJokboRecord(${j.id})">✏️수정</button>` : '';
            container.innerHTML += `
                <div class="jokbo-card">
                    ${editBtnHtml}
                    <button class="del-btn" onclick="deleteJokboRecord(${j.id})">✖</button>
                    <div><span class="jokbo-tag tag-enemy">상대방어덱</span>${enemyVisuals}</div>
                    <div><span class="jokbo-tag tag-counter">추천공격 조합</span>${counterVisuals}</div>
                    <div style="color:#cbd5e1; font-size:12px; background:#1e293b; padding:8px; border-radius:6px; line-height:1.4; border-left: 3px solid #eab308; margin-top:2px;">💡 ${j.tips}</div>
                    <div style="text-align:right; font-size:10px; color:#64748b;">작성자: ${j.author}</div>
                </div>`;
        });
    }

    function addJokboRecord() {
        if (!currentUser) return;
        const enemyString = document.getElementById('input-enemy-names').value.trim();
        const counterString = document.getElementById('input-counter-names').value.trim();
        const tips = document.getElementById('add-tips').value.trim();
        if (!enemyString || !counterString) { alert("⚠️ 방어덱과 공격 조합에 1명 이상의 영웅을 기입해 주세요."); return; }
        JokboData.push({ id: Date.now(), enemy: enemyString.replace(/\s+/g, ' '), counter: counterString.replace(/\s+/g, ' '), tips: tips || "특별한 팁 없음", author: currentUser });
        saveJokbo();
        document.getElementById('input-enemy-names').value = ''; document.getElementById('input-counter-names').value = ''; document.getElementById('add-tips').value = '';
    }

    function deleteJokboRecord(id) {
        const record = JokboData.find(j => j.id === id); if (!record) return;
        if (record.author !== currentUser && !isAdminMode && record.author !== "시스템") { alert("❌ 본인이 작성한 기록물만 파기할 수 있습니다."); return; }
        if (confirm("해당 족보를 삭제할까요?")) { JokboData = JokboData.filter(j => j.id !== id); saveJokbo(); }
    }

    function updateLoginSelectOptions() {
        const select = document.getElementById('login-username-select');
        if (!select) return; select.innerHTML = '';
        guildMembers.filter(m => m.name !== "").forEach(m => { select.innerHTML += `<option value="${m.name}">${m.name}</option>`; });
    }

    function checkAuthStatus() {
        if (currentUser && getGuildMemberObj(currentUser)) {
            document.getElementById('current-user-display').innerText = currentUser;
            document.getElementById('custom-login-modal').style.display = 'none';
        } else {
            document.getElementById('custom-login-modal').style.display = 'flex';
        }
    }

    function handleWebLogin() {
        const nameInput = document.getElementById('login-username-select').value;
        const pwInput = document.getElementById('login-password').value.trim();
        const errorMsg = document.getElementById('login-error-msg');
        const userObj = getGuildMemberObj(nameInput);
        if (userObj) {
            if (userObj.password === pwInput) {
                currentUser = nameInput; localStorage.setItem('skr_current_user', currentUser);
                document.getElementById('current-user-display').innerText = currentUser;
                errorMsg.innerText = ""; document.getElementById('custom-login-modal').style.display = 'none';
                if (pwInput === "0000") {
                    setTimeout(() => {
                        let newPw = prompt(`🔑 [${currentUser}]님의 커스텀 비밀번호를 새로 지정하세요:`);
                        if (newPw && newPw.trim() !== "" && newPw.trim() !== "0000") { userObj.password = newPw.trim(); saveMembers(); alert("비번 변경 완료!"); }
                    }, 100);
                }
            } else { errorMsg.innerText = "❌ 비밀번호가 틀렸습니다."; }
        } else { errorMsg.innerText = "❌ 명단에 없는 길드원입니다."; }
    }

    function logout() { localStorage.removeItem('skr_current_user'); currentUser = ""; document.getElementById('login-password').value = ""; checkAuthStatus(); }

    function drawSidebar() {
        const container = document.getElementById('member-status-container');
        if (!container) return; container.innerHTML = '';
        guildMembers.forEach((m, idx) => {
            const isMe = m.name === currentUser ? 'me' : '';
            const isExhausted = m.tickets <= 0 ? 'exhausted' : '';
            const isDisabled = !isAdminMode ? 'disabled' : '';
            let badgeHtml = `<span class="status-badge avail">참가중</span>`;
            if (m.name === "") { badgeHtml = `<span class="status-badge" style="color:#475569;">미등록</span>`; } 
            else if (m.tickets <= 0) { badgeHtml = `<span class="status-badge empty">소진</span>`; }
            let pwInputHtml = '';
            if (isAdminMode && m.name !== "") {
                pwInputHtml = `
                    <div class="stat-item">
                        <span style="color:#a78bfa;">PW:</span>
                        <input type="password" class="input-user-pw" value="${m.password || '0000'}" onchange="updateMemberPassword(${idx}, this.value)">
                    </div>`;
            }
            container.innerHTML += `
                <div class="member-row ${isMe} ${isExhausted}">
                    <input type="text" class="input-name" value="${m.name}" placeholder="[비어있음]" ${isDisabled} onchange="updateMemberName(${idx}, this.value)">
                    <div class="stat-group">
                        ${pwInputHtml}
                        <div class="stat-item"><span style="color:#94a3b8;">티켓:</span><input type="number" class="input-stat t-count" value="${m.tickets}" min="0" max="5" ${isDisabled} onchange="updateMemberStat(${idx}, 'tickets', this.value)"></div>
                        <div class="stat-item"><span style="color:#38bdf8;">완파:</span><input type="number" class="input-stat s-count" value="${m.success || 0}" min="0" ${isDisabled} onchange="updateMemberStat(${idx}, 'success', this.value)"></div>
                        <div class="stat-item"><span style="color:#f97316;">실패:</span><input type="number" class="input-stat f-count" value="${m.fail || 0}" min="0" ${isDisabled} onchange="updateMemberStat(${idx}, 'fail', this.value)"></div>
                    </div>
                    ${badgeHtml}
                </div>`;
        });
    }

    function addGuildMemberSlot() {
        if (!isAdminMode) { alert("❌ 권한 거부: 관리자 비번 인증이 필요합니다."); return; }
        guildMembers.push({ name: "", password: "0000", tickets: 5, success: 0, fail: 0 });
        saveMembers();
    }

    function updateMemberName(index, value) { guildMembers[index].name = value.trim(); if (guildMembers[index].name !== "" && !guildMembers[index].password) { guildMembers[index].password = "0000"; } saveMembers(); }
    function updateMemberPassword(index, value) { guildMembers[index].password = value.trim() || "0000"; saveMembers(); }
    function updateMemberStat(index, field, value) { guildMembers[index][field] = Math.max(0, parseInt(value) || 0); saveMembers(); }
    function getGuildMemberObj(name) { return guildMembers.find(m => m.name !== "" && m.name === name); }

    function checkPassword(inputPw) {
        const lockIcon = document.getElementById('lock-icon');
        if (inputPw === REAL_ADMIN_PASSWORD) {
            lockIcon.innerText = "🔓 편집 모드 활성화"; lockIcon.className = "lock-status unlocked"; isAdminMode = true;
        } else {
            lockIcon.innerText = "🔒 명단 편집 잠김"; lockIcon.className = "lock-status locked"; isAdminMode = false;
        }
        drawSidebar(); drawHeroStorage(); drawJokbo();
    }

    function resetAllDecks() {
        if (!isAdminMode) {
            alert("❌ 권한 거부: 전체 초기화 기능은 좌측 [관리자 비번 인증] 후에만 사용할 수 있습니다.");
            return;
        }
        
        if (confirm("⚠️ [경고] 새 시즌 초기화를 진행하시겠습니까?\n\n- 방어덱 영웅, 공격자 기록, 실패횟수가 비워집니다.\n- 길드원 현황판 횟수(티켓 5장, 완파/실패 0회)가 초기화됩니다.\n\n(참고: 명단/비번과 성채 소유자는 그대로 유지됩니다.)")) {
            
            DecksData.forEach(d => {
                d.status = '대기중';
                d.attacker = '';
                d.failCount = 0;
                d.defender = ''; 
            });
            
            guildMembers.forEach(m => {
                if (m.name !== "") {
                    m.tickets = 5;
                    m.success = 0;
                    m.fail = 0;
                }
            });

            // 통합 트랜잭션 성격의 set 처리
            db.ref('guildData').set({
                members: guildMembers,
                decks: DecksData,
                jokbo: JokboData,
                heroStorage: HeroStorage
            }).then(() => {
                alert("✅ 새 시즌 맞이 전체 데이터가 성공적으로 동기화 초기화되었습니다.");
            });
        }
    }

    function hasPermission(deck) { return deck.attacker === "" || deck.attacker === currentUser || isAdminMode; }

    function selectDeckForStorage(id) {
        if (selectedDeckId === id) { selectedDeckId = null; } 
        else { selectedDeckId = id; }
        drawDecks();
    }

    function drawDecks() {
        const grid = document.getElementById('deck-grid');
        if (!grid) return; grid.innerHTML = '';
        document.getElementById('current-castle-title').innerText = `${currentCastle} 방어덱 배치 상황`;

        const filtered = DecksData.filter(d => d.castleName === currentCastle);
        filtered.forEach(d => {
            let cardClass = 'card', badgeClass = 'badge ready', actionHtml = '', attackerContent = `<span class="name-text" style="color:#64748b;">공격 없음</span>`;
            const isInputDisabled = !hasPermission(d) ? 'disabled' : '';
            const isSelected = d.id === selectedDeckId;
            if (isSelected) { cardClass += ' selected-deck-target'; }

            const defenderVisuals = getHeroHtmlCollection(d.defender);
            let selectTargetBtn = !isInputDisabled ? `<button onclick="selectDeckForStorage(${d.id})" style="background:${isSelected ? '#0284c7':'#334155'}; border: 1px solid ${isSelected?'#38bdf8':'#475569'}; color:white; font-size:11px; padding:3px 8px; border-radius:4px; cursor:pointer; font-weight:bold; white-space:nowrap;">${isSelected ? '🎯 선택됨' : '📍 선택'}</button>` : '';

            let defenderContent = `
                <div style="display:flex; flex-direction:column; gap:6px; width:100%;">
                    <div style="display:flex; gap:4px; align-items:center; width:100%;">
                        <input type="text" class="input-defender" placeholder="방어덱 영웅" value="${d.defender || ''}" ${isInputDisabled} onchange="updateDefender(${d.id}, this.value)" style="flex:1; width:100px;">
                        ${selectTargetBtn}
                    </div>
                    <div style="width:100%;">${defenderVisuals}</div>
                </div>`;
            
            let ownerContent = `<input type="text" class="input-owner" placeholder="소유자 이름" value="${d.owner || ''}" ${isInputDisabled} onchange="updateOwner(${d.id}, this.value)" style="width:100%; box-sizing:border-box;">`;

            if (d.status === '완파') {
                defenderContent = `<div style="display:flex; flex-direction:column; gap:4px; width:100%;"><span class="name-text" style="color:#64748b; text-decoration:line-through; font-size:13px;">${d.defender || '미등록'}</span><div style="width:100%; opacity:0.5;">${defenderVisuals}</div></div>`;
                ownerContent = `<span style="font-size:13px; color:#64748b; font-weight:bold;">${d.owner || '미지정'}</span>`;
            }

            if (d.status === '대기중') {
                actionHtml = `<button class="btn" onclick="book(${d.id})">참전 예약</button>`;
            } else if (d.status === '예약됨') {
                badgeClass = 'badge ing'; cardClass += ' reserved';
                attackerContent = `<span class="name-text" style="color:#facc15;">⚡ ${d.attacker} 선점</span>`;
                if (hasPermission(d)) {
                    actionHtml = `<div class="btn-group-3"><button class="btn-3 btn-success" onclick="useTicketAndChangeState(${d.id}, '완파')">완파</button><button class="btn-3 btn-failure" onclick="useTicketAndChangeState(${d.id}, '공격실패')">실패</button><button class="btn-3 btn-cancel" onclick="changeState(${d.id}, '대기중')">취소</button></div>`;
                } else { actionHtml = `<button class="btn" style="background:#334155; color:#94a3b8; cursor:not-allowed;" disabled>🔒 다른 멤버 예약 중</button>`; }
            } else if (d.status === '공격실패') {
                badgeClass = 'badge fail'; cardClass += ' fail';
                attackerContent = `<span class="name-text" style="color:#f97316;">❌ 패배: ${d.attacker}</span>`;
                actionHtml = `<button class="btn" style="background-color:#ea580c;" onclick="book(${d.id})">재도전 예약</button>`;
            } else if (d.status === '완파') {
                badgeClass = 'badge done'; cardClass += ' done';
                attackerContent = `<span class="name-text" style="color:#f43f5e;">💥 정복자: ${d.attacker}</span>`;
                actionHtml = `<button class="btn" style="background:#334155;" onclick="resetDeck(${d.id})">초기화</button>`;
            }

            grid.innerHTML += `
                <div class="${cardClass}">
                    <div>
                        <div class="card-header"><span class="castle-name">${d.deckNum}</span><span class="${badgeClass}">${d.status}</span></div>
                        <div class="info-row"><span class="info-label">👤 소유자</span>${ownerContent}</div>
                        <div class="info-row"><span class="info-label">🛡️ 방어배치</span>${defenderContent}</div>
                        <div class="info-row"><span class="info-label">⚔️ 공격담당</span>${attackerContent}</div>
                        <div class="info-row"><span class="info-label">⚠️ 누적 실패</span><input type="number" class="input-failcount" value="${d.failCount || 0}" min="0" ${isInputDisabled} onchange="updateFailCount(${d.id}, this.value)"></div>
                    </div>
                    ${actionHtml}
                </div>`;
        });
    }

    function updateDefender(id, value) { const deck = DecksData.find(d => d.id === id); if (!hasPermission(deck)) return; deck.defender = value; saveToStorage(); }
    function updateOwner(id, value) { const deck = DecksData.find(d => d.id === id); if (!hasPermission(deck)) return; deck.owner = value.trim(); saveToStorage(); }
    function updateFailCount(id, value) { const deck = DecksData.find(d => d.id === id); if (!hasPermission(deck)) return; deck.failCount = parseInt(value) || 0; saveToStorage(); }
    
    function book(id) {
        if (!currentUser) return;
        const userObj = getGuildMemberObj(currentUser);
        if (userObj && userObj.tickets <= 0) { alert("❌ 소지한 길드전 티켓을 모두 소진했습니다!"); return; }
        const deck = DecksData.find(d => d.id === id); if (deck.status === '예약됨') return;
        deck.status = '예약됨'; deck.attacker = currentUser; saveToStorage();
    }
    
    function useTicketAndChangeState(id, nextStatus) {
        const deck = DecksData.find(d => d.id === id); if (!hasPermission(deck)) return;
        const userObj = guildMembers.find(m => m.name === deck.attacker);
        if (userObj) {
            userObj.tickets = Math.max(0, userObj.tickets - 1);
            if (nextStatus === '완파') { userObj.success = (userObj.success || 0) + 1; } 
            else if (nextStatus === '공격실패') { userObj.fail = (userObj.fail || 0) + 1; }
        }
        deck.status = nextStatus;
        if (nextStatus === '공격실패') deck.failCount = (deck.failCount || 0) + 1;
        
        saveMembers(); 
        saveToStorage();
    }
    
    function changeState(id, status) { const deck = DecksData.find(d => d.id === id); if (!hasPermission(deck)) return; deck.status = status; if (status === '대기중') deck.attacker = ''; saveToStorage(); }
    function resetDeck(id) { const deck = DecksData.find(d => d.id === id); deck.status = '대기중'; deck.attacker = ''; deck.failCount = 0; saveToStorage(); }
    
    function switchCastle(castleName) {
        currentCastle = castleName; selectedDeckId = null; 
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => { btn.classList.remove('active'); if(btn.innerText === castleName || (castleName === '본성' && btn.innerText.includes('본성'))) { btn.classList.add('active'); } });
        drawDecks();
    }
</script>
</body>
</html>
