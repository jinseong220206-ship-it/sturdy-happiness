<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세븐나이츠 리버스 길드전 예약 시스템</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a24; color: #e1e1e6; padding: 20px; margin: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; color: #f39c12; margin-bottom: 30px; font-size: 28px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    
    /* 뷰 섹션 제어 */
    .view-section { display: none; }
    #login-view { display: block; max-width: 400px; margin: 100px auto; background: #222232; padding: 30px; border-radius: 12px; border: 1px solid #2d2d44; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-weight: bold; color: #f39c12; margin-bottom: 8px; }
    .input-group input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 16px; background: #151520; color: #fff; border: 1px solid #444; border-radius: 6px; }
    
    .btn-primary { width: 100%; padding: 12px; background: #f39c12; color: #1a1a24; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-primary:hover { background: #e67e22; }
    
    .castle-section { margin-bottom: 35px; }
    .castle-title { border-left: 5px solid #f39c12; padding-left: 12px; margin-bottom: 15px; color: #f1f2f6; font-size: 20px; }
    .castle-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
    
    .castle-btn { background: #2c2c3e; color: #fff; border: 1px solid #3d3d5c; padding: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    .castle-btn:hover { background: #3d3d5c; border-color: #f39c12; transform: translateY(-2px); }
    
    #deck-view, #admin-view { background: #222232; padding: 25px; border-radius: 12px; border: 1px solid #2d2d44; }
    .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; margin-top: 20px; }
    
    .deck-card { padding: 18px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.2); box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: space-between; gap: 12px; transition: transform 0.15s ease; }
    .deck-card:hover { transform: scale(1.02); }
    
    .deck-empty { background: #1e6b3e; color: #e6ffed; }
    .deck-reserved { background: #b05c1d; color: #fff7f2; }
    .deck-cleared { background: #4b5563; color: #d1d5db; opacity: 0.8; }
    
    .deck-header { display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: bold; }
    .deck-status-text { font-size: 13px; background: rgba(0,0,0,0.3); padding: 3px 8px; border-radius: 20px; }
    
    .note-box { width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 6px; padding: 8px; color: #fff; font-size: 13px; resize: none; margin-top: 5px; }
    .note-box:focus { border-color: #f39c12; outline: none; }
    .note-save-btn { background: #444; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; align-self: flex-end; transition: 0.1s; }
    .note-save-btn:hover { background: #666; }
    
    .card-actions { display: flex; gap: 8px; margin-top: 5px; }
    .action-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: background 0.1s; }
    .btn-reserve { background: #27ae60; color: white; width: 100%; padding: 10px; font-size: 14px; }
    .btn-reserve:hover { background: #2ecc71; }
    .btn-cancel { background: #c0392b; color: white; }
    .btn-cancel:hover { background: #e74c3c; }
    .btn-clear { background: #2980b9; color: white; }
    .btn-clear:hover { background: #3498db; }
    
    .nav-btn { background: #7f8c8d; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; margin-right: 10px; }
    .nav-btn:hover { background: #95a5a6; }
    .btn-danger { background: #c0392b; color: white; }
    .btn-danger:hover { background: #e74c3c; }
    
    /* 관리자 스타일 */
    .admin-link { display: inline-block; margin-top: 25px; color: #888; text-decoration: none; font-size: 13px; cursor: pointer; }
    .admin-link:hover { color: #f39c12; }
    .member-list { background: #151520; padding: 15px; border-radius: 8px; max-height: 250px; overflow-y: auto; margin-bottom: 20px; text-align: left; }
    .member-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #2d2d44; }
    .member-del-btn { background: #c0392b; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: background 0.1s; }
    .member-del-btn:hover { background: #e74c3c; }
    .user-info-bar { display: flex; justify-content: space-between; align-items: center; background: #222232; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #2d2d44; }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="login-view" class="view-section">
      <h2 style="color: #f39c12; margin-top:0;">길드원 인증</h2>
      <p style="color: #aaa; font-size: 14px;">등록된 길드원 닉네임만 입장 가능합니다.</p>
      <div class="input-group">
        <label for="login-username">닉네임 입력</label>
        <input type="text" id="login-username" placeholder="게임 내 닉네임">
      </div>
      <button class="btn-primary" id="btn-login">입장하기</button>
      <span class="admin-link" id="link-admin-mode">⚙️ 관리자 모드 진입</span>
    </div>

    <div id="user-bar" style="display: none;" class="user-info-bar">
      <div>접속 닉네임: <strong id="display-user-name" style="color:#f39c12;"></strong></div>
      <button class="nav-btn" id="btn-logout" style="margin:0;">로그아웃</button>
    </div>

    <div id="main-view" class="view-section">
      <h1>세븐나이츠 리버스 길드전 상황판</h1>
      <div class="castle-section">
        <h2 class="castle-title">외성 (각 10덱)</h2>
        <div class="castle-grid" id="outer-grid"></div>
      </div>
      <div class="castle-section">
        <h2 class="castle-title">내성 (각 15덱)</h2>
        <div class="castle-grid" id="inner-grid"></div>
      </div>
      <div class="castle-section">
        <h2 class="castle-title">본성 (20덱)</h2>
        <div class="castle-grid" id="main-grid"></div>
      </div>
    </div>

    <div id="deck-view" class="view-section">
      <button class="nav-btn" id="btn-back-main">⬅ 성 목록으로 돌아가기</button>
      <h2 id="current-castle-name" class="castle-title"></h2>
      <div class="deck-grid" id="deck-container"></div>
    </div>

    <div id="admin-view" class="view-section">
      <button class="nav-btn" id="btn-back-login">⬅ 뒤로 가기</button>
      <h2 class="castle-title" style="border-color: #e74c3c;">길드 관리자 패널</h2>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top:20px;">
        <div>
          <h3>👥 길드원 명단 관리</h3>
          <div class="member-list" id="admin-member-list"></div>
          <div class="input-group" style="display:flex; gap:10px;">
            <input type="text" id="new-member-name" placeholder="추가할 길드원 닉네임" style="flex:1; background:#151520; color:#fff; border:1px solid #444; border-radius:6px; padding:10px;">
            <button class="nav-btn" id="btn-add-member" style="margin:0; background:#27ae60;">등록</button>
          </div>
        </div>

        <div style="border-left: 1px solid #3d3d5c; padding-left: 30px;">
          <h3>⚠️ 시즌/일일 데이터 초기화</h3>
          <p style="color:#aaa; font-size:14px; line-height: 1.5;">
            버튼을 누르면 외성, 내성, 본성의 모든 덱 예약 상태와 완파 여부, 적어놓은 메모 정보가 <strong>전부 공백(초기 상태)</strong>으로 초기화됩니다.
          </p>
          <button class="nav-btn btn-danger" id="btn-system-reset" style="width:100%; padding:15px; font-size:16px; margin-top:20px;">🔄 전체 덱 정보 초기화 수행</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, collection, onSnapshot, runTransaction, setDoc, deleteDoc, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 연동된 파이어베이스 프로젝트 설정값
    const firebaseConfig = {
      apiKey: "AIzaSyB_qHa-F1rmBE8tH2D-JS5k3IYm3KzUcIw",
      authDomain: "senari-dde7d.firebaseapp.com",
      projectId: "senari-dde7d",
      storageBucket: "senari-dde7d.firebasestorage.app",
      messagingSenderId: "94791864912",
      appId: "1:94791864912:web:d816c2fab68666c54a7755",
      measurementId: "G-S9EYWTB4LS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const config = {
      outer: { count: 5, decks: 10, prefix: '외성' },
      inner: { count: 3, decks: 15, prefix: '내성' },
      main: { count: 1, decks: 20, prefix: '본성' }
    };

    let currentUnsubscribe = null;
    let memberListUnsubscribe = null;
    let activeCastleId = null;
    let loggedInUser = null;

    function switchView(viewId) {
      document.querySelectorAll('.view-section').forEach(view => view.style.display = 'none');
      document.getElementById(viewId).style.display = 'block';
      
      if (viewId === 'main-view' || viewId === 'deck-view') {
        document.getElementById('user-bar').style.display = 'flex';
        document.getElementById('display-user-name').innerText = loggedInUser;
      } else {
        document.getElementById('user-bar').style.display = 'none';
      }
    }

    // 로그인 상태 자동 복구
    window.addEventListener('DOMContentLoaded', async () => {
      const savedUser = localStorage.getItem('sk_logged_in_user');
      if (savedUser) {
        try {
          const memberRef = doc(db, "members", savedUser);
          const memberDoc = await getDoc(memberRef);
          if (memberDoc.exists()) {
            loggedInUser = savedUser;
            renderMainView();
            switchView('main-view');
            return;
          }
        } catch (e) {
          console.error("세션 복구 실패:", e);
        }
        localStorage.removeItem('sk_logged_in_user');
      }
      switchView('login-view');
    });

    // 로그인 확인 처리
    document.getElementById('btn-login').onclick = async () => {
      const inputName = document.getElementById('login-username').value.trim();
      if (!inputName) return alert("닉네임을 입력해주세요!");

      const memberRef = doc(db, "members", inputName);
      try {
        const memberDoc = await getDoc(memberRef);
        if (memberDoc.exists()) {
          loggedInUser = inputName;
          localStorage.setItem('sk_logged_in_user', inputName);
          renderMainView();
          switchView('main-view');
        } else {
          alert("등록되지 않은 길드원 닉네임입니다.\n관리자 패널(⚙️)에서 명단을 먼저 등록해 주세요.");
        }
      } catch (e) {
        alert("🚨 서버 연결 실패!\nFirestore 데이터베이스 상태와 규칙을 확인하세요.");
        console.error(e);
      }
    };

    document.getElementById('btn-logout').onclick = () => {
      loggedInUser = null;
      localStorage.removeItem('sk_logged_in_user');
      document.getElementById('login-username').value = '';
      if (currentUnsubscribe) currentUnsubscribe();
      switchView('login-view');
    };

    // 관리자 모드 패널 진입
    document.getElementById('link-admin-mode').onclick = () => {
      const pw = prompt("관리자 비밀번호를 입력하세요:");
      if (pw === "2748") {
        switchView('admin-view');
        listenMemberList();
      } else if (pw !== null) {
        alert("비밀번호가 일치하지 않습니다!");
      }
    };

    // ✨ 실시간 길드원 저장 목록 로드 및 안전한 삭제 동기화 구조
    function listenMemberList() {
      if (memberListUnsubscribe) memberListUnsubscribe();
      
      memberListUnsubscribe = onSnapshot(collection(db, "members"), (snapshot) => {
        const listDiv = document.getElementById('admin-member-list');
        listDiv.innerHTML = '';
        
        if (snapshot.empty) {
          listDiv.innerHTML = '<div style="color:#666; text-align:center; padding:20px;">등록된 길드원이 없습니다.</div>';
          return;
        }

        snapshot.forEach(doc => {
          const name = doc.id;
          
          // 각 유저 행 엘리먼트 생성
          const item = document.createElement('div');
          item.className = 'member-item';
          
          const nameSpan = document.createElement('span');
          nameSpan.innerText = name;
          
          // 삭제 버튼 이벤트 즉시 바인딩 구조로 개선 (실시간 유실 방지)
          const delBtn = document.createElement('button');
          delBtn.className = 'member-del-btn';
          delBtn.innerText = '제거';
          delBtn.onclick = async () => {
            if (confirm(`[${name}] 길드원을 명단에서 삭제하시겠습니까?`)) {
              try {
                await deleteDoc(doc(db, "members", name));
                alert(`[${name}] 길드원이 성공적으로 삭제되었습니다.`);
              } catch (err) {
                alert("🚨 삭제 실패: " + err.message);
              }
            }
          };
          
          item.appendChild(nameSpan);
          item.appendChild(delBtn);
          listDiv.appendChild(item);
        });
      }, (err) => {
        alert("🚨 명단 실시간 동기화 오류: " + err.message);
      });
    }

    // ✨ 신규 길드원 등록 (데이터베이스 영구 저장)
    document.getElementById('btn-add-member').onclick = async () => {
      const newName = document.getElementById('new-member-name').value.trim();
      if (!newName) return alert("추가할 닉네임을 입력하세요!");
      
      try {
        // Firestore 'members' 컬렉션에 닉네임을 Key값으로 지정하여 저장
        await setDoc(doc(db, "members", newName), { addedAt: new Date().toISOString() });
        document.getElementById('new-member-name').value = '';
        alert(`[${newName}] 길드원이 정상 등록되어 서버에 저장되었습니다.`);
      } catch(e) {
        alert("🚨 저장 실패! Firestore 규칙(Rules) 설정을 확인하세요.\n에러내용: " + e.message);
      }
    };

    // 시스템 전체 성 데이터 일괄 초기화
    document.getElementById('btn-system-reset').onclick = async () => {
      if (!confirm("⚠️ 정말로 전체 덱 데이터를 초기화하시겠습니까?\n메모를 포함한 진행 상황이 모두 삭제됩니다.")) return;
      
      const batch = writeBatch(db);
      const types = ['outer', 'inner', 'main'];
      
      for (const type of types) {
        for (let i = 1; i <= config[type].count; i++) {
          const castleId = `${type}_${i}`;
          for (let d = 1; d <= config[type].decks; d++) {
            const deckRef = doc(db, "castles", castleId, "decks", String(d));
            batch.set(deckRef, { status: 'empty', user: null, note: '', reservedAt: null });
          }
        }
      }

      try {
        await batch.commit();
        alert("전체 데이터 초기화가 완료되었습니다.");
      } catch (e) {
        alert("초기화 처리 실패: " + e.message);
      }
    };

    function renderMainView() {
      ['outer', 'inner', 'main'].forEach(type => {
        const grid = document.getElementById(`${type}-grid`);
        grid.innerHTML = '';
        for (let i = 1; i <= config[type].count; i++) {
          const castleId = `${type}_${i}`;
          const name = `${config[type].prefix} ${i}`;
          
          const btn = document.createElement('button');
          btn.className = 'castle-btn';
          btn.innerText = name;
          btn.onclick = () => loadCastleDecks(castleId, name);
          grid.appendChild(btn);
        }
      });
    }

    function loadCastleDecks(castleId, castleName) {
      activeCastleId = castleId;
      switchView('deck-view');
      document.getElementById('current-castle-name').innerText = castleName;

      if (currentUnsubscribe) currentUnsubscribe();

      const type = castleId.split('_')[0];
      const maxDecks = config[type].decks;

      currentUnsubscribe = onSnapshot(collection(db, "castles", castleId, "decks"), (snapshot) => {
        const serverData = {};
        snapshot.forEach(doc => {
          serverData[doc.id] = doc.data();
        });

        const container = document.getElementById('deck-container');
        container.innerHTML = '';

        for (let d = 1; d <= maxDecks; d++) {
          const deckId = String(d);
          const rawData = serverData[deckId] || {};
          
          const data = {
            status: rawData.status || 'empty',
            user: rawData.user || null,
            note: rawData.note || ''
          };
          
          const card = document.createElement('div');
          card.className = `deck-card deck-${data.status}`;

          let statusText = '공격 가능';
          if (data.status === 'reserved') statusText = `${data.user} 예약중`;
          if (data.status === 'cleared') statusText = `완파 (${data.user})`;

          let html = `
            <div class="deck-header">
              <span>덱 ${d}</span>
              <span class="deck-status-text">${statusText}</span>
            </div>
          `;

          html += `
            <div>
              <textarea class="note-box" id="note-${d}" placeholder="덱 정보 입력 (조합 등)" rows="2">${data.note}</textarea>
              <div style="display:flex; justify-content:flex-end; margin-top:4px;">
                <button class="note-save-btn" data-deck="${d}">메모 저장</button>
              </div>
            </div>
          `;

          html += `<div class="card-actions">`;
          if (data.status === 'empty') {
            html += `<button class="action-btn btn-reserve" data-action="reserve" data-deck="${d}">예약하기</button>`;
          } else if (data.status === 'reserved') {
            if (loggedInUser === data.user) {
              html += `
                <button class="action-btn btn-cancel" data-action="cancel" data-deck="${d}">취소</button>
                <button class="action-btn btn-clear" data-action="clear" data-deck="${d}">완파</button>
              `;
            }
          }
          html += `</div>`;

          card.innerHTML = html;
          container.appendChild(card);
        }

        setupCardEvents();
      }, (error) => {
        console.error("Firestore 호출 에러:", error);
      });
    }

    function setupCardEvents() {
      document.querySelectorAll('.note-save-btn').forEach(btn => {
        btn.onclick = async (e) => {
          const deckNum = e.target.dataset.deck;
          const noteText = document.getElementById(`note-${deckNum}`).value;
          await updateDeckNote(activeCastleId, deckNum, noteText);
        };
      });

      document.querySelectorAll('.card-actions button').forEach(btn => {
        btn.onclick = async (e) => {
          const action = e.target.dataset.action;
          const deckNum = e.target.dataset.deck;

          if (action === 'reserve') {
            await reserveDeckSecurely(activeCastleId, deckNum, loggedInUser);
          } else if (action === 'cancel') {
            if (confirm("예약을 취소하시겠습니까?")) {
              await changeDeckStatus(activeCastleId, deckNum, 'empty', null);
            }
          } else if (action === 'clear') {
            if (confirm("완파 처리하시겠습니까?")) {
              await changeDeckStatus(activeCastleId, deckNum, 'cleared', loggedInUser);
            }
          }
        };
      });
    }

    async function reserveDeckSecurely(castleId, deckNum, userName) {
      const deckRef = doc(db, "castles", castleId, "decks", String(deckNum));
      try {
        await runTransaction(db, async (transaction) => {
          const deckDoc = await transaction.get(deckRef);
          if (deckDoc.exists() && deckDoc.data().status !== 'empty') {
            throw "이미 다른 길드원이 선점한 덱입니다!";
          }
          const existingNote = deckDoc.exists() ? (deckDoc.data().note || '') : '';
          transaction.set(deckRef, {
            status: 'reserved',
            user: userName,
            note: existingNote,
            reservedAt: new Date().toISOString()
          }, { merge: true });
        });
        alert("예약 성공!");
      } catch (error) {
        alert(error);
      }
    }

    async function changeDeckStatus(castleId, deckNum, status, userName) {
      const deckRef = doc(db, "castles", castleId, "decks", String(deckNum));
      try {
        await setDoc(deckRef, { status: status, user: userName }, { merge: true });
      } catch (e) {
        console.error(e);
      }
    }

    async function updateDeckNote(castleId, deckNum, noteText) {
      const deckRef = doc(db, "castles", castleId, "decks", String(deckNum));
      try {
        await setDoc(deckRef, { note: noteText }, { merge: true });
        alert("메모가 저장되었습니다.");
      } catch (e) {
        console.error(e);
      }
    }

    document.getElementById('btn-back-main').onclick = () => {
      if (currentUnsubscribe) currentUnsubscribe();
      switchView('main-view');
    };

    document.getElementById('btn-back-login').onclick = () => {
      if (memberListUnsubscribe) memberListUnsubscribe();
      switchView('login-view');
    };
